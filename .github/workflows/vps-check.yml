name: VPS Health Check
on:
  workflow_dispatch:
jobs:
  check:
    name: Check Connie VPS
    runs-on: ubuntu-latest
    steps:
      - name: Check VPS status
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            CONNIE_HOME=$(grep 'Environment=HOME=' /etc/systemd/system/local-connie.service 2>/dev/null | sed 's/.*HOME=//')

            echo "=== 1. Service status ==="
            systemctl status local-connie --no-pager -l 2>&1 | head -15

            echo ""
            echo "=== 2. Service unit file (ExecStopPost check) ==="
            cat /etc/systemd/system/local-connie.service

            echo ""
            echo "=== 3. ALL node processes ==="
            ps aux | grep node | grep -v grep

            echo ""
            echo "=== 4. ALL files with discord webhook URLs ==="
            grep -rl "discord.com/api/webhooks\|discordapp.com/api/webhooks" / --include="*.sh" --include="*.js" --include="*.py" --include="*.json" 2>/dev/null || echo "NONE FOUND"

            echo ""
            echo "=== 5. Crash notify scripts anywhere ==="
            find / -maxdepth 5 -name "*crash*notify*" -type f 2>/dev/null || echo "NONE FOUND"

            echo ""
            echo "=== 6. Crontab ==="
            crontab -l 2>/dev/null || echo "No crontab"

            echo ""
            echo "=== 7. Systemd timers ==="
            systemctl list-timers --all --no-pager 2>/dev/null | head -20

            echo ""
            echo "=== 8. spawn-agent.sh webhook lines ==="
            grep -n "discord\|webhook\|curl" "$CONNIE_HOME/spawn-agent.sh" 2>/dev/null || echo "No webhook lines"

            echo ""
            echo "=== 9. App log since last restart ==="
            tail -30 /tmp/connie-research.log 2>/dev/null

            echo ""
            echo "=== 10. Git version ==="
            cd /root/.openclaw/workspace/artifacts/automaton-research && git log --oneline -3

            echo ""
            echo "=== 11. discord-bot directory ==="
            ls -la "$CONNIE_HOME/discord-bot/" 2>/dev/null || echo "No discord-bot dir"
            cat "$CONNIE_HOME/discord-bot/package.json" 2>/dev/null | head -5 || true
            cat "$CONNIE_HOME/discord-bot/index.js" 2>/dev/null | head -30 || true

            echo ""
            echo "=== 12. ALL .js files in CONNIE_HOME (1 level) ==="
            find "$CONNIE_HOME" -maxdepth 1 -name "*.js" -type f 2>/dev/null | while read f; do
              echo "--- $f ---"
              head -3 "$f"
            done

            echo ""
            echo "=== 13. PM2 ecosystem/config ==="
            cat "$CONNIE_HOME/.pm2/dump.pm2" 2>/dev/null | python3 -c "import json,sys; [print(p['name'],p.get('pm_exec_path','?')) for p in json.load(sys.stdin)]" 2>/dev/null || echo "No PM2 dump"
