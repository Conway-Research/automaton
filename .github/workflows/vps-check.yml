name: VPS Health Check
on:
  workflow_dispatch:
jobs:
  check:
    name: Check Connie VPS
    runs-on: ubuntu-latest
    steps:
      - name: Check VPS status
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            CONNIE_HOME=$(grep 'Environment=HOME=' /etc/systemd/system/local-connie.service 2>/dev/null | sed 's/.*HOME=//')

            echo "=== 1. Service Status ==="
            systemctl status local-connie --no-pager -l 2>&1 | head -12

            echo ""
            echo "=== 2. Agent State (from DB) ==="
            DB="$CONNIE_HOME/.automaton/state.db"
            if [ -f "$DB" ]; then
              sqlite3 "$DB" "SELECT key, value FROM kv WHERE key IN ('agent_state', 'sleep_until', 'orchestrator.state', 'soul_content_hash', 'current_tier') ORDER BY key;" 2>/dev/null || echo "DB query failed"
            else
              echo "No state.db found"
            fi

            echo ""
            echo "=== 3. Active Goals ==="
            if [ -f "$DB" ]; then
              sqlite3 "$DB" "SELECT id, title, status, created_at FROM goals ORDER BY created_at DESC LIMIT 5;" 2>/dev/null || echo "No goals table"
            fi

            echo ""
            echo "=== 4. Task Graph (recent) ==="
            if [ -f "$DB" ]; then
              sqlite3 "$DB" "SELECT title, status, updated_at FROM task_graph ORDER BY updated_at DESC LIMIT 10;" 2>/dev/null || echo "No task_graph table"
            fi

            echo ""
            echo "=== 5. WORKLOG.md ==="
            cat "$CONNIE_HOME/.automaton/WORKLOG.md" 2>/dev/null | head -60 || echo "No WORKLOG.md"

            echo ""
            echo "=== 6. SOUL.md (first 40 lines) ==="
            head -40 "$CONNIE_HOME/.automaton/SOUL.md" 2>/dev/null || echo "No SOUL.md"

            echo ""
            echo "=== 7. Webhook URL check ==="
            # Verify webhook is NOT in SOUL.md (should be stripped)
            if grep -q "discord.com/api/webhooks" "$CONNIE_HOME/.automaton/SOUL.md" 2>/dev/null; then
              echo "WARNING: Webhook URL still in SOUL.md!"
            else
              echo "OK: No webhook URL in SOUL.md"
            fi
            # Verify webhook IS in automaton.json
            python3 -c "import json; c=json.load(open('$CONNIE_HOME/.automaton/automaton.json')); print('automaton.json webhook:', 'SET' if c.get('discordWebhookUrl') else 'NOT SET')" 2>/dev/null

            echo ""
            echo "=== 8. Recent Errors ==="
            grep -E "\[FATAL\]|\[ERROR\]" /tmp/connie-research.log 2>/dev/null | tail -10 || echo "No errors"

            echo ""
            echo "=== 9. App Log (last 60 lines) ==="
            tail -60 /tmp/connie-research.log 2>/dev/null || echo "No log file"

            echo ""
            echo "=== 10. Rogue Process Check ==="
            PM2_HOME="$CONNIE_HOME/.pm2" pm2 list 2>/dev/null | head -10 || echo "No PM2"
            echo "--- Node processes ---"
            CONNIE_PID=$(systemctl show local-connie --property=MainPID --value 2>/dev/null || echo "0")
            ps aux | grep "[n]ode" | grep -v "PID $CONNIE_PID" | head -5 || echo "No rogue node processes"
